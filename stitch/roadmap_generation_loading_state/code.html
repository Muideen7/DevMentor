<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E8736A",
                        "background-light": "#F5F4F2",
                        "background-dark": "#191919",
                        "neutral-gray": "#757575",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glow-top-right {
            background: radial-gradient(circle at top right, rgba(232, 115, 106, 0.1) 0%, transparent 50%);
        }
        .glow-bottom-left {
            background: radial-gradient(circle at bottom left, rgba(255, 218, 185, 0.2) 0%, transparent 50%);
        }
        @keyframes soft-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .pulse-element {
            animation: soft-pulse 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center glow-top-right glow-bottom-left overflow-hidden">
<div class="flex flex-col items-center justify-center max-w-[600px] w-full px-6 text-center">
<div class="relative flex items-center justify-center mb-12">
<div class="pulse-element absolute w-32 h-32 bg-primary/20 rounded-full blur-xl"></div>
<div class="pulse-element relative w-24 h-24 bg-primary flex items-center justify-center rounded-full shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-5xl">auto_awesome</span>
</div>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl md:text-4xl font-bold tracking-tight mb-4">
                Your mentor is building your roadmap...
            </h1>
<p class="text-neutral-gray dark:text-slate-400 text-base md:text-lg font-normal leading-relaxed mb-10 max-w-md">
                Analyzing your goals, level, and availability to create the perfect path for you.
            </p>
<div class="w-full max-w-sm space-y-4">
<div class="flex justify-between items-end mb-2">
<span class="text-primary text-sm font-semibold uppercase tracking-wider">Processing</span>
<span class="text-neutral-gray text-xs font-medium">Step 2 of 4</span>
</div>
<div class="relative h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full" style="width: 45%;"></div>
</div>
<div class="flex flex-col gap-2 pt-4">
<div class="flex items-center gap-2 justify-center text-neutral-gray/60 dark:text-slate-500 text-sm italic">
<span class="material-symbols-outlined text-sm">architecture</span>
<span>Structuring learning modules...</span>
</div>
</div>
</div>
</div>
<div class="absolute bottom-10 left-0 right-0 flex justify-center opacity-40">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
</div>
</div>
</div>
</body></html>
