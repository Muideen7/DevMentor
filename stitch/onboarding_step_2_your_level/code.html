<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DevMentor AI - Onboarding Step 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E8736A",
                        "accent-soft": "#FDF0EF",
                        "dark-charcoal": "#1a1a1a",
                        "warm-gray": "#F5F4F2",
                        "background-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #ffffff;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(232, 115, 106, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 100% 100%, rgba(232, 115, 106, 0.05) 0%, transparent 30%);
        }
    </style>
</head>
<body class="min-h-screen text-dark-charcoal">
<div class="max-w-[680px] mx-auto px-6 py-12 flex flex-col items-center">
<!-- Logo -->
<div class="mb-12 flex items-center gap-2">
<div class="bg-primary p-2 rounded-lg">
<svg fill="none" height="24" viewbox="0 0 48 48" width="24" xmlns="http://www.w3.org/2000/svg">

</div>
<span class="text-2xl font-bold tracking-tight">DevMentor</span>
</div>
<!-- Progress Indicator -->
<div class="w-full flex items-center justify-between mb-16 relative px-4">
<!-- Progress Line Background -->
<div class="absolute top-5 left-[15%] right-[15%] h-[2px] bg-slate-200 -z-10"></div>
<!-- Active Progress Line -->
<div class="absolute top-5 left-[15%] w-[35%] h-[2px] bg-primary -z-10"></div>
<!-- Step 1 -->
<div class="flex flex-col items-center gap-2 group">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">check</span>
</div>
<span class="text-sm font-medium text-slate-400">Your Goal</span>
</div>
<!-- Step 2 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white ring-4 ring-primary/20">
<span class="text-base font-bold">2</span>
</div>
<span class="text-sm font-bold text-primary">Your Level</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500">
<span class="text-base font-bold">3</span>
</div>
<span class="text-sm font-medium text-slate-400">Your Time</span>
</div>
</div>
<!-- Header Content -->
<div class="text-center mb-10">
<h1 class="text-4xl font-bold mb-3 tracking-tight">Where are you right now?</h1>
<p class="text-slate-500 text-lg">Be honest. This helps your roadmap start at exactly the right place.</p>
</div>
<!-- Experience Level Selector -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mb-10">
<!-- Card 1 -->
<button class="flex flex-col items-start p-6 bg-warm-gray border-2 border-transparent rounded-lg text-left hover:border-slate-300 transition-all group">
<span class="material-symbols-outlined text-slate-500 mb-4 group-hover:scale-110 transition-transform">potted_plant</span>
<h3 class="font-bold text-lg mb-1">Complete Beginner</h3>
<p class="text-sm text-slate-500 leading-relaxed">I've watched a few videos but haven't really written code yet.</p>
</button>
<!-- Card 2 (PRE-SELECTED) -->
<button class="flex flex-col items-start p-6 bg-accent-soft border-2 border-primary rounded-lg text-left relative transition-all ring-1 ring-primary/10">
<div class="absolute top-4 right-4 bg-primary text-white rounded-full p-0.5">
<span class="material-symbols-outlined text-xs">check</span>
</div>
<span class="material-symbols-outlined text-primary mb-4">menu_book</span>
<h3 class="font-bold text-lg mb-1">Know the Basics</h3>
<p class="text-sm text-slate-600 leading-relaxed">I understand HTML, CSS, and basic JavaScript but haven't built real projects.</p>
</button>
<!-- Card 3 -->
<button class="flex flex-col items-start p-6 bg-warm-gray border-2 border-transparent rounded-lg text-left hover:border-slate-300 transition-all group">
<span class="material-symbols-outlined text-slate-500 mb-4 group-hover:scale-110 transition-transform">deployed_code</span>
<h3 class="font-bold text-lg mb-1">Built Small Projects</h3>
<p class="text-sm text-slate-500 leading-relaxed">I've finished a few tutorials and built something simple, but I'm not consistent.</p>
</button>
<!-- Card 4 -->
<button class="flex flex-col items-start p-6 bg-warm-gray border-2 border-transparent rounded-lg text-left hover:border-slate-300 transition-all group">
<span class="material-symbols-outlined text-slate-500 mb-4 group-hover:scale-110 transition-transform">settings</span>
<h3 class="font-bold text-lg mb-1">Intermediate</h3>
<p class="text-sm text-slate-500 leading-relaxed">I can build things but I lack structure, depth, and direction.</p>
</button>
</div>
<!-- Tech Stack Selector -->
<div class="w-full mb-8">
<h4 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4 px-1">What interests you?</h4>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full border border-slate-200 text-sm font-medium hover:bg-slate-50 transition-colors">Web Apps</button>
<button class="px-5 py-2.5 rounded-full border border-primary bg-accent-soft text-primary text-sm font-semibold">Mobile Apps</button>
<button class="px-5 py-2.5 rounded-full border border-slate-200 text-sm font-medium hover:bg-slate-50 transition-colors">AI and Machine Learning</button>
<button class="px-5 py-2.5 rounded-full border border-primary bg-accent-soft text-primary text-sm font-semibold">Backend and APIs</button>
<button class="px-5 py-2.5 rounded-full border border-slate-200 text-sm font-medium hover:bg-slate-50 transition-colors">Data and Analytics</button>
<button class="px-5 py-2.5 rounded-full border border-slate-200 text-sm font-medium hover:bg-slate-50 transition-colors">Games</button>
</div>
</div>
<!-- Dropdown -->
<div class="w-full mb-12">
<label class="block text-sm font-bold uppercase tracking-wider text-slate-400 mb-3 px-1">Preferred programming language (optional)</label>
<div class="relative">
<select class="w-full appearance-none bg-warm-gray border-0 rounded-lg px-6 py-4 text-slate-600 focus:ring-2 focus:ring-primary/20 transition-all cursor-pointer">
<option disabled="" selected="" value="">e.g. JavaScript, Python, any...</option>
<option value="javascript">JavaScript</option>
<option value="python">Python</option>
<option value="typescript">TypeScript</option>
<option value="swift">Swift</option>
<option value="rust">Rust</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Navigation -->
<div class="w-full flex items-center justify-between mt-4">
<button class="flex items-center gap-2 text-slate-500 font-semibold hover:text-dark-charcoal transition-colors px-4 py-2">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                Back
            </button>
<button class="bg-dark-charcoal text-white px-8 py-4 rounded-full font-bold flex items-center gap-3 hover:bg-black transition-all shadow-lg shadow-black/10">
                Continue to Step 3
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
